# 线上配置文件
spring:
  # DataSource Config
  datasource:
    driver-class-name: com.mysql.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL} #jdbc:mysql://localhost:3306/ogafish?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  # session 失效时间
  session:
    timeout: 86400
server:
  address: 0.0.0.0
